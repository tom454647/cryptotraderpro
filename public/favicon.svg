<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="#020617"/>
  <g transform="translate(50,50)">
    <!-- Scale icon -->
    <rect x="-25" y="-5" width="50" height="4" rx="2" fill="url(#grad)"/>
    <rect x="-2" y="-5" width="4" height="25" rx="2" fill="url(#grad)"/>
    <circle cx="-20" cy="5" r="12" fill="none" stroke="url(#grad)" stroke-width="3"/>
    <circle cx="20" cy="5" r="12" fill="none" stroke="url(#grad)" stroke-width="3"/>
  </g>
</svg>
